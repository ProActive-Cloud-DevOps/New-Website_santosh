apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: myspace-app
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ProActive-Cloud-DevOps/New-Website_santosh.git
    targetRevision: main
    path: k8s/base

  destination:
    server: https://kubernetes.default.svc
    namespace: myspace-website

  syncPolicy:
    automated:
      prune: true
      selfHeal: true