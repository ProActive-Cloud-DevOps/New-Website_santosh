apiVersion: apps/v1
kind: Deployment

metadata:
  name: webpage-deployment
  namespace: webpage-1

spec:
  replicas: 2

  selector:
    matchLabels:
      app: webpage

  template:
    metadata:
      labels:
        app: webpage

    spec:
      containers:
      - name: webpage
        image: nginx:alpine

        ports:
        - containerPort: 80