apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio

spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio
        image: nnksantosh/portfolio:785216ccd609a413e7316b4f2640a791cb8adb6e
        imagePullPolicy: Always
        ports:
        - containerPort: 80