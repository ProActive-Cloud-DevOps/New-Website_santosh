apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio

spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio
        image: nnksantosh/portfolio::a64ca85be611774577fc3ae88e16c2fb1d5f88c0
        ports:
        - containerPort: 80