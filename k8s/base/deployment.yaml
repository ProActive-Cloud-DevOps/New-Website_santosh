apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio

spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio
        image: nnksantosh/portfolio:83d2ac7a6f155c0d7c842c0dabd4553824d8d432
        ports:
        - containerPort: 80