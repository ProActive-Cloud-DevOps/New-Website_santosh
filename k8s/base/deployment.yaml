apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio

spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio
        image: nnksantosh/portfolio:e193992c16e16074e39b1e80fbae44edb93669a5
        ports:
        - containerPort: 80