apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: portfolio

spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio

  template:
    metadata:
      labels:
        app: portfolio

    spec:
      containers:
      - name: portfolio
        image: nnksantosh/portfolio:0246d48ee4a16d51e9b16d9ec26f27423cfe3779
        imagePullPolicy: Always
        ports:
        - containerPort: 80