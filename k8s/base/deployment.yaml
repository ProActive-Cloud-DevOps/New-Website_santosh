apiVersion: apps/v1
kind: Deployment

metadata:
  name: myspace-app
  namespace: myspace-website

spec:
  replicas: 1

  selector:
    matchLabels:
      app: myspace-app

  template:
    metadata:
      labels:
        app: myspace-app

    spec:
      containers:
      - name: myspace-app

        image: nnksantosh/webpage-1:09402cff380b24d0f0818a4c1ebf940eab15f310

        imagePullPolicy: Always

        ports:
        - containerPort: 80

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"

          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /
            port: 80

          initialDelaySeconds: 15
          periodSeconds: 20
          timeoutSeconds: 5
          failureThreshold: 3