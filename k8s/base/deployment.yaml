apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio1
  namespace: portfolio1

spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio1

  template:
    metadata:
      labels:
        app: portfolio1

    spec:
      containers:
      - name: portfolio1
        image: nnksantosh/portfolio1:2e3aeaea4c0c520464aea22c671536b42d80d20f
        imagePullPolicy: Always
        ports:
        - containerPort: 80